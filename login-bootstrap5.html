<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Control Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="./marble-design-system.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .08), transparent 26%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, .05), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, #f3f6fb 100%);
    }

    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .login-panel {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(226, 232, 240, .9);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .10);
      backdrop-filter: blur(12px);
    }

    .login-form-panel {
      padding: 40px 36px 32px;
      background: rgba(255, 255, 255, .94);
    }

    .login-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .login-logo {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 18px;
      flex: 0 0 46px;
    }

    .form-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 650;
      color: #334155;
      margin: 0;
      letter-spacing: -.02em;
    }

    .login-form .form-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748b;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .input-icon {
      position: relative;
    }

    .input-icon .bi {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
      pointer-events: none;
    }

    .input-icon .form-control {
      padding-left: 42px;
      height: 52px;
      border-radius: 14px;
      background: #fff;
    }

    .login-form .form-control:focus {
      border-color: rgba(37, 99, 235, .35);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .10);
    }

    .form-row-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 14px 0 26px;
      font-size: 13px;
      color: #64748b;
    }

    .form-check-label,
    .meta-link {
      color: #64748b;
      text-decoration: none;
    }

    .meta-link:hover {
      color: #2563eb;
    }

    .btn-login {
      height: 52px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -.01em;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border: 0;
      box-shadow: 0 14px 32px rgba(37, 99, 235, .24);
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }

    .login-footer {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
    }

    @media (max-width: 991.98px) {
      .login-form-panel {
        padding: 32px 24px 28px;
      }
    }

    @media (max-width: 575.98px) {
      .login-shell {
        padding: 16px;
      }

      .login-panel {
        border-radius: 20px;
      }

      .form-title {
        font-size: 26px;
      }

      .form-row-meta {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-panel">
      <div class="login-form-panel">
        <div class="login-header">
          <div class="login-logo"><i class="bi bi-shield-lock"></i></div>
          <h2 class="form-title">Sign in</h2>
        </div>

        <form class="login-form">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-icon">
              <i class="bi bi-person"></i>
              <input type="text" class="form-control" placeholder="Enter your username">
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label">Password</label>
            <div class="input-icon">
              <i class="bi bi-lock"></i>
              <input type="password" class="form-control" placeholder="Enter your password">
            </div>
          </div>

          <div class="form-row-meta">
            <div class="form-check m-0">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Remember this device</label>
            </div>
            <a href="#" class="meta-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 btn-login">Sign in</button>
        </form>

      </div>
    </section>
  </main>
</body>
</html>
